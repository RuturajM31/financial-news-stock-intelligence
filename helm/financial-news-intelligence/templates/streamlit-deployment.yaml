apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "financial-news-intelligence.streamlitFullname" . }}
  labels:
    {{- include "financial-news-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: streamlit
spec:
  {{- if not .Values.autoscaling.streamlit.enabled }}
  replicas: {{ .Values.streamlit.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "financial-news-intelligence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: streamlit
  template:
    metadata:
      labels:
        {{- include "financial-news-intelligence.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: streamlit
        {{- with .Values.streamlit.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.streamlit.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      serviceAccountName: {{ include "financial-news-intelligence.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.streamlit.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: streamlit
          image: "{{ .Values.streamlit.image.repository }}:{{ .Values.streamlit.image.tag }}"
          imagePullPolicy: {{ .Values.streamlit.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          env:
            - name: FNI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "financial-news-intelligence.apiKeySecretName" . }}
                  key: {{ .Values.apiKey.key }}
            - name: FNI_STREAMLIT_API_BASE_URL
              value: "http://{{ include "financial-news-intelligence.fastapiFullname" . }}:{{ .Values.fastapi.service.port }}"
            - name: FNI_STREAMLIT_API_TIMEOUT_SECONDS
              value: {{ .Values.streamlit.apiTimeoutSeconds | quote }}
            - name: FNI_STREAMLIT_MAX_RESPONSE_BYTES
              value: {{ .Values.streamlit.maxResponseBytes | quote }}
            - name: FNI_STREAMLIT_MAX_UPLOAD_BYTES
              value: {{ .Values.streamlit.maxUploadBytes | quote }}
          startupProbe:
            httpGet:
              path: /_stcore/health
              port: http
            failureThreshold: {{ .Values.streamlit.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.streamlit.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.streamlit.startupProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            failureThreshold: {{ .Values.streamlit.readinessProbe.failureThreshold }}
            periodSeconds: {{ .Values.streamlit.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.streamlit.readinessProbe.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            failureThreshold: {{ .Values.streamlit.livenessProbe.failureThreshold }}
            periodSeconds: {{ .Values.streamlit.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.streamlit.livenessProbe.timeoutSeconds }}
          resources:
            {{- toYaml .Values.streamlit.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.streamlit.tmpfsSizeLimit }}
      {{- with .Values.streamlit.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.streamlit.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.streamlit.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.streamlit.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
