apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "financial-news-intelligence.fastapiFullname" . }}
  labels:
    {{- include "financial-news-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: fastapi
spec:
  {{- if not .Values.autoscaling.fastapi.enabled }}
  replicas: {{ .Values.fastapi.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "financial-news-intelligence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: fastapi
  template:
    metadata:
      labels:
        {{- include "financial-news-intelligence.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: fastapi
        {{- with .Values.fastapi.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.fastapi.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      serviceAccountName: {{ include "financial-news-intelligence.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.fastapi.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fastapi
          image: "{{ .Values.fastapi.image.repository }}:{{ .Values.fastapi.image.tag }}"
          imagePullPolicy: {{ .Values.fastapi.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: FNI_API_ENVIRONMENT
              value: production
            - name: FNI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "financial-news-intelligence.apiKeySecretName" . }}
                  key: {{ .Values.apiKey.key }}
            - name: FNI_REQUIRE_API_KEY
              value: "true"
            - name: FNI_TRUSTED_HOSTS
              value: "{{ include "financial-news-intelligence.fastapiFullname" . }},{{ include "financial-news-intelligence.fastapiFullname" . }}.{{ .Release.Namespace }}.svc,127.0.0.1,localhost"
            - name: FNI_PROJECT_ROOT
              value: /opt/fni/project
            - name: FNI_SENTIMENT_MODEL_DIRECTORY
              value: artifacts/models/distilbert_sentiment/final_model
            - name: FNI_DEEP_READINESS_PROBE
              value: "false"
            - name: PYTHONHASHSEED
              value: "0"
            - name: OMP_NUM_THREADS
              value: "1"
            - name: MKL_NUM_THREADS
              value: "1"
            - name: OPENBLAS_NUM_THREADS
              value: "1"
            - name: NUMEXPR_NUM_THREADS
              value: "1"
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: {{ .Values.fastapi.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.fastapi.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.fastapi.startupProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            failureThreshold: {{ .Values.fastapi.readinessProbe.failureThreshold }}
            periodSeconds: {{ .Values.fastapi.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.fastapi.readinessProbe.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: {{ .Values.fastapi.livenessProbe.failureThreshold }}
            periodSeconds: {{ .Values.fastapi.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.fastapi.livenessProbe.timeoutSeconds }}
          resources:
            {{- toYaml .Values.fastapi.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.fastapi.tmpfsSizeLimit }}
      {{- with .Values.fastapi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fastapi.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fastapi.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fastapi.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
