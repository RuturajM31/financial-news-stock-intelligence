{{- if .Values.autoscaling.fastapi.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "financial-news-intelligence.fastapiFullname" . }}
  labels:
    {{- include "financial-news-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: fastapi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "financial-news-intelligence.fastapiFullname" . }}
  minReplicas: {{ .Values.autoscaling.fastapi.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.fastapi.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.fastapi.targetCPUUtilizationPercentage }}
---
{{- end }}
{{- if .Values.autoscaling.streamlit.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "financial-news-intelligence.streamlitFullname" . }}
  labels:
    {{- include "financial-news-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: streamlit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "financial-news-intelligence.streamlitFullname" . }}
  minReplicas: {{ .Values.autoscaling.streamlit.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.streamlit.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.streamlit.targetCPUUtilizationPercentage }}
{{- end }}
