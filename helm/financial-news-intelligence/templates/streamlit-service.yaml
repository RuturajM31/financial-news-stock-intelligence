apiVersion: v1
kind: Service
metadata:
  name: {{ include "financial-news-intelligence.streamlitFullname" . }}
  labels:
    {{- include "financial-news-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: streamlit
spec:
  type: {{ .Values.streamlit.service.type }}
  selector:
    {{- include "financial-news-intelligence.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: streamlit
  ports:
    - name: http
      port: {{ .Values.streamlit.service.port }}
      targetPort: http
      protocol: TCP
