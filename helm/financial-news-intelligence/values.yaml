nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: false

apiKey:
  existingSecret: financial-news-intelligence-api
  key: api-key

fastapi:
  replicaCount: 1
  image:
    repository: financial-news-intelligence-fastapi
    tag: local
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  podAnnotations: {}
  podLabels: {}
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "4608Mi"
  tmpfsSizeLimit: 768Mi
  terminationGracePeriodSeconds: 45
  startupProbe:
    failureThreshold: 24
    periodSeconds: 5
    timeoutSeconds: 3
  readinessProbe:
    failureThreshold: 6
    periodSeconds: 10
    timeoutSeconds: 3
  livenessProbe:
    failureThreshold: 3
    periodSeconds: 20
    timeoutSeconds: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

streamlit:
  replicaCount: 1
  image:
    repository: financial-news-intelligence-streamlit
    tag: local
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8501
  podAnnotations: {}
  podLabels: {}
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  tmpfsSizeLimit: 256Mi
  terminationGracePeriodSeconds: 30
  apiTimeoutSeconds: 30
  maxResponseBytes: 5242880
  maxUploadBytes: 5242880
  startupProbe:
    failureThreshold: 24
    periodSeconds: 5
    timeoutSeconds: 3
  readinessProbe:
    failureThreshold: 6
    periodSeconds: 10
    timeoutSeconds: 3
  livenessProbe:
    failureThreshold: 3
    periodSeconds: 20
    timeoutSeconds: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  capabilities:
    drop:
      - ALL

networkPolicy:
  enabled: true
  allowFastapiExternalHttpEgress: true
  streamlitIngressFromAllNamespaces: false

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: financial-news-intelligence.example.invalid
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  fastapi:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  streamlit:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  fastapi:
    enabled: false
    minAvailable: 1
  streamlit:
    enabled: false
    minAvailable: 1
