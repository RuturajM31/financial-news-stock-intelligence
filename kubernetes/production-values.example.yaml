# Copy outside Git and replace image tags/hostnames for the target environment.
apiKey:
  existingSecret: financial-news-intelligence-api
  key: api-key

fastapi:
  replicaCount: 2
  image:
    repository: financial-news-intelligence-fastapi
    tag: replace-with-package-11-7-image-tag
    pullPolicy: IfNotPresent
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: fastapi

streamlit:
  replicaCount: 2
  image:
    repository: financial-news-intelligence-streamlit
    tag: replace-with-package-11-7-image-tag
    pullPolicy: IfNotPresent
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: streamlit

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: financial-news-intelligence.example.invalid
      paths:
        - path: /
          pathType: Prefix
  tls: []

podDisruptionBudget:
  fastapi:
    enabled: true
    minAvailable: 1
  streamlit:
    enabled: true
    minAvailable: 1

networkPolicy:
  enabled: true
  allowFastapiExternalHttpEgress: true
  streamlitIngressFromAllNamespaces: true
