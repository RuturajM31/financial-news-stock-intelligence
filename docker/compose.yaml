services:
  fastapi:
    image: financial-news-intelligence-fastapi:${FNI_DOCKER_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: docker/Dockerfile.fastapi
    environment:
      FNI_API_ENVIRONMENT: production
      FNI_API_KEY: ${FNI_API_KEY:?FNI_API_KEY is required}
      FNI_REQUIRE_API_KEY: "true"
      FNI_TRUSTED_HOSTS: fastapi,127.0.0.1,localhost
      FNI_PROJECT_ROOT: /opt/fni/project
      FNI_SENTIMENT_MODEL_DIRECTORY: artifacts/models/distilbert_sentiment/final_model
      FNI_DEEP_READINESS_PROBE: "false"
      PYTHONHASHSEED: "0"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    ports:
      - target: 8000
        published: "${FNI_FASTAPI_PORT:-18000}"
        host_ip: "127.0.0.1"
        protocol: tcp
    expose:
      - "8000"
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=768m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 4608m
    cpus: 4.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/fni/project/.venv/bin/python", "/opt/fni/project/docker/healthcheck.py", "--url", "http://127.0.0.1:8000/health", "--expect", "PASSED"]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 10
    networks:
      - backend

  streamlit:
    image: financial-news-intelligence-streamlit:${FNI_DOCKER_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    environment:
      FNI_API_KEY: ${FNI_API_KEY:?FNI_API_KEY is required}
      FNI_STREAMLIT_API_BASE_URL: http://fastapi:8000
      FNI_STREAMLIT_API_TIMEOUT_SECONDS: "30"
      FNI_STREAMLIT_MAX_RESPONSE_BYTES: "5242880"
      FNI_STREAMLIT_MAX_UPLOAD_BYTES: "5242880"
    ports:
      - target: 8501
        published: "${FNI_STREAMLIT_PORT:-18501}"
        host_ip: "127.0.0.1"
        protocol: tcp
    expose:
      - "8501"
    depends_on:
      fastapi:
        condition: service_healthy
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 1024m
    cpus: 2.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/fni/project/.venv-streamlit/bin/python", "/opt/fni/project/docker/healthcheck.py", "--url", "http://127.0.0.1:8501/_stcore/health", "--expect", "ok"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 10
    networks:
      - backend

networks:
  backend:
    driver: bridge
