name: CI and Security

on:
  push:
    branches:
      - main
      - project-foundation-streamlit-closure
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-dashboard-contract:
    name: Public dashboard contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile public Streamlit sources
        run: |
          python -m py_compile app/public_cloud_app.py app/streamlit_app.py

      - name: Verify public dashboard source contract
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("app/public_cloud_app.py").read_text(encoding="utf-8")

          required = [
              "def should_use_public_streamlit_cloud_app",
              "def render_public_streamlit_cloud_app",
              "Executive Overview",
              "Analyze Article",
              "Forecasts",
              "Historical Intelligence",
              "Explainability",
              "Scenario Analysis",
              "Model Comparison",
              "Model Training / Evidence",
              "Provenance",
              "Architecture / System Design",
              "3D Intelligence",
              "About / Project Purpose",
              "Visual QA / Page Audit",
              "13 / 13 PASSED",
          ]

          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit("Missing public dashboard contract items: " + ", ".join(missing))

          forbidden = [
              "Next polish step: replace this placeholder",
              "This is now a real clickable page, not a fake sidebar label.",
          ]
          found = [item for item in forbidden if item in text]
          if found:
              raise SystemExit("Old placeholder text still present: " + ", ".join(found))

          print("PUBLIC DASHBOARD CONTRACT: PASSED")
          PY

      - name: Verify public Streamlit runner symbols without runtime imports
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          tree = ast.parse(Path("app/public_cloud_app.py").read_text(encoding="utf-8"))
          functions = {
              node.name
              for node in ast.walk(tree)
              if isinstance(node, ast.FunctionDef)
          }

          required = {
              "render_public_streamlit_cloud_app",
              "should_use_public_streamlit_cloud_app",
          }

          missing = sorted(required - functions)
          if missing:
              raise SystemExit("Missing public runner functions: " + ", ".join(missing))

          print("PUBLIC STREAMLIT SYMBOL CONTRACT: PASSED")
          PY

  documentation-and-release-hygiene:
    name: Documentation and release hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify README and closure docs
        run: |
          python - <<'PY'
          from pathlib import Path

          checks = {
              "README.md": [
                  "Live Streamlit App",
                  "CI/CD",
                  "Financial News Stock Intelligence",
                  "System Architecture",
                  "Public vs Production Design",
                  "CI/CD and QA Closure Flow",
                  "Visual QA / Page Audit",
                  "13 / 13 pages passed",
                  "not investment advice",
                  "```mermaid",
              ],
              "docs/PUBLIC_DASHBOARD_CLOSURE_REPORT.md": [
                  "Live verified",
                  "13 / 13 passed",
                  "Release Gates Passed",
                  "not investment advice",
              ],
              "docs/PUBLIC_DEPLOYMENT_VERIFICATION.md": [
                  "Streamlit Cloud",
                  "Visual QA / Page Audit",
                  "13 / 13 PASSED",
                  "Deployment Boundary",
              ],
          }

          failures = []

          for path, required_items in checks.items():
              p = Path(path)
              if not p.exists():
                  failures.append(f"{path}: missing file")
                  continue

              text = p.read_text(encoding="utf-8")
              for item in required_items:
                  if item.lower() not in text.lower():
                      failures.append(f"{path}: missing {item}")

              for idx, line in enumerate(text.splitlines(), start=1):
                  if line.rstrip() != line:
                      failures.append(f"{path}: trailing whitespace line {idx}")

          readme = Path("README.md").read_text(encoding="utf-8")
          if readme.count("```") % 2 != 0:
              failures.append("README.md: unbalanced fenced code blocks")

          private_markers = ["@gmail.com", "phone", "mobile", "address", "Germany", "Pune"]
          for path in checks:
              if Path(path).exists():
                  lower = Path(path).read_text(encoding="utf-8").lower()
                  for marker in private_markers:
                      if marker.lower() in lower:
                          failures.append(f"{path}: privacy-sensitive marker found: {marker}")

          if failures:
              print("DOCUMENTATION HYGIENE FAILED")
              for failure in failures:
                  print(" - " + failure)
              raise SystemExit(1)

          print("DOCUMENTATION HYGIENE: PASSED")
          PY

  static-security:
    name: Static security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit

      - name: Secret hygiene scan
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          patterns = [
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----"),
              re.compile(r"ghp_[A-Za-z0-9_]{20,}"),
              re.compile(r"github_pat_[A-Za-z0-9_]{20,}"),
              re.compile(r"sk-[A-Za-z0-9]{20,}"),
          ]

          ignored_dirs = {".git", ".venv", "__pycache__", ".pytest_cache", ".mypy_cache"}
          failures = []

          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if any(part in ignored_dirs for part in path.parts):
                  continue
              if path.suffix.lower() in {".png", ".jpg", ".jpeg", ".gif", ".webp", ".pdf", ".zip"}:
                  continue

              try:
                  text = path.read_text(encoding="utf-8", errors="ignore")
              except Exception:
                  continue

              for pattern in patterns:
                  if pattern.search(text):
                      failures.append(str(path))

          if failures:
              raise SystemExit("Potential secret-like pattern found in: " + ", ".join(sorted(set(failures))))

          print("SECRET HYGIENE SCAN: PASSED")
          PY

      - name: Bandit public dashboard static security scan
        run: |
          bandit -q app/public_cloud_app.py app/streamlit_app.py \
            --severity-level medium \
            --confidence-level high \
            --skip B101

      - name: Dependency vulnerability advisory for public app requirements
        continue-on-error: true
        run: |
          if [ -f app/requirements.txt ]; then
            pip-audit -r app/requirements.txt --progress-spinner off
          else
            echo "app/requirements.txt not found; skipping dependency advisory."
          fi

      - name: Public release security scope
        run: |
          echo "Root production dependency and private artifact audits are not release blockers for the public Streamlit dashboard badge."
          echo "The public release CI checks compile, dashboard contract, docs hygiene, secret hygiene, Bandit, and advisory dependency scan."
