name: Public application quality

on:
  push:
    branches: [main, cleanup/senior-project-structure]
  pull_request:

permissions:
  contents: read

jobs:
  retained-application:
    name: Retained Streamlit and Full BERT contracts
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Install retained test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt
          python -m pip install datasets==3.2.0 scikit-learn==1.5.0 pytest==8.3.4

      - name: Compile retained Python files
        run: |
          python - <<'PY'
          import py_compile
          from pathlib import Path

          roots = (Path("app"), Path("src"), Path("scripts"), Path("tests"))
          files = sorted(path for root in roots for path in root.rglob("*.py"))
          for path in files:
              py_compile.compile(str(path), doraise=True)
          print(f"COMPILED {len(files)} RETAINED PYTHON FILES")
          PY

      - name: Verify the four-page public route contract
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          source = Path("app/public_cloud_app.py").read_text(encoding="utf-8")
          tree = ast.parse(source)
          names = [node.name for node in ast.walk(tree) if isinstance(node, ast.FunctionDef)]
          duplicates = sorted({name for name in names if names.count(name) > 1})
          if duplicates:
              raise SystemExit("Duplicate functions: " + ", ".join(duplicates))

          expected_pages = ("Overview", "Analyze Article", "Model Results", "About / Architecture")
          retired_pages = (
              "Forecasts", "Historical Intelligence", "Explainability", "Scenario Analysis",
              "Model Comparison", "Model Training / Evidence", "Provenance",
              "Architecture / System Design", "3D Intelligence", "About / Project Purpose",
              "Visual QA / Page Audit",
          )
          missing = [page for page in expected_pages if page not in source]
          present_retired = [page for page in retired_pages if page in source]
          if missing or present_retired:
              raise SystemExit(f"Missing={missing}; retired={present_retired}")

          entrypoint = Path("app/streamlit_app.py").read_text(encoding="utf-8")
          if "render_public_streamlit_cloud_app(PROJECT_ROOT)" not in entrypoint:
              raise SystemExit("The Streamlit entry point does not directly render the public app.")
          print("FOUR-PAGE ROUTE CONTRACT: PASSED")
          PY

      - name: Run offline retained tests
        run: |
          python -m pytest -q \
            tests/test_public_sentiment_refinement.py \
            tests/test_streamlit_navigation_branding.py \
            tests/test_overview_landing.py \
            tests/test_architecture_observatory.py \
            tests/test_full_bert_streamlit_integration.py::test_all_public_routes_render \
            tests/test_full_bert_streamlit_integration.py::test_model_results_experiment_lab_renders_verified_metrics \
            tests/test_full_bert_inference.py \
            tests/test_full_bert_model_source.py \
            tests/test_bert_visualization.py \
            tests/test_experiment_results.py \
            tests/test_financial_phrasebank.py \
            tests/test_financial_phrasebank_split.py \
            tests/test_bert_training.py \
            tests/test_distilbert_training.py \
            tests/test_bert_smoke_runner.py \
            tests/test_full_bert_runner.py
